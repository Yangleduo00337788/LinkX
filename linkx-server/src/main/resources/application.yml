server:
  port: ${LINKX_SERVER_PORT:8080}

spring:
  application:
    name: linkx-server
  profiles:
    active: ${LINKX_PROFILE:dev}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: ${LINKX_DB_URL:jdbc:mysql://localhost:3306/linkx_im?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${LINKX_DB_USERNAME:root}
    password: ${LINKX_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${LINKX_REDIS_HOST:localhost}
      port: ${LINKX_REDIS_PORT:6379}
      database: 0
      password: ${LINKX_REDIS_PASSWORD:}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

linkx:
  api-base-url: ${LINKX_API_BASE_URL:http://localhost:8080}
  security:
    auth-rate-limit:
      enabled: ${LINKX_SECURITY_AUTH_RATE_LIMIT_ENABLED:true}
      window-seconds: ${LINKX_SECURITY_AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
      login-max-requests: ${LINKX_SECURITY_AUTH_LOGIN_MAX_REQUESTS:10}
      register-max-requests: ${LINKX_SECURITY_AUTH_REGISTER_MAX_REQUESTS:5}
      refresh-max-requests: ${LINKX_SECURITY_AUTH_REFRESH_MAX_REQUESTS:20}
    captcha:
      enabled: ${LINKX_SECURITY_CAPTCHA_ENABLED:false}
  jwt:
    secret: ${LINKX_JWT_SECRET:PLEASE_CHANGE_ME_LINKX_JWT_SECRET_2026_32CHARS_MIN}  # required: override via env before startup
    expiration: ${LINKX_JWT_EXPIRATION:86400000}  # 24小时
    refresh-expiration: ${LINKX_JWT_REFRESH_EXPIRATION:604800000}  # 7天
  upload:
    path: ${LINKX_UPLOAD_PATH:${user.dir}/uploads/}
    url: ${LINKX_UPLOAD_URL:http://localhost:8080/uploads/}
