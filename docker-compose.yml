# Full stack (prod simulation): copy .env.prod-local.example to .env, then:
#   docker compose up -d --build
# Dev dependencies only: docker compose -f docker-compose.dev.yml up -d

services:
  mysql:
    image: mysql:8.4
    container_name: ${LINKX_COMPOSE_PROJECT:-linkx}-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${LINKX_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${LINKX_DB_NAME}
      MYSQL_USER: ${LINKX_DB_USERNAME}
      MYSQL_PASSWORD: ${LINKX_DB_PASSWORD}
      TZ: ${LINKX_TIMEZONE}
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${LINKX_DB_PORT}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./linkx-server/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: ${LINKX_COMPOSE_PROJECT:-linkx}-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${LINKX_REDIS_PASSWORD}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    ports:
      - "${LINKX_REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  server:
    build:
      context: .
      dockerfile: linkx-server/Dockerfile
    container_name: ${LINKX_COMPOSE_PROJECT:-linkx}-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: ${LINKX_TIMEZONE}
      LINKX_PROFILE: ${LINKX_PROFILE}
      LINKX_SERVER_PORT: ${LINKX_SERVER_PORT}
      LINKX_API_BASE_URL: ${LINKX_API_BASE_URL}
      LINKX_DB_URL: jdbc:mysql://mysql:3306/${LINKX_DB_NAME}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      LINKX_DB_USERNAME: ${LINKX_DB_USERNAME}
      LINKX_DB_PASSWORD: ${LINKX_DB_PASSWORD}
      LINKX_REDIS_HOST: redis
      LINKX_REDIS_PORT: 6379
      LINKX_REDIS_PASSWORD: ${LINKX_REDIS_PASSWORD}
      LINKX_JWT_SECRET: ${LINKX_JWT_SECRET}
      LINKX_JWT_EXPIRATION: ${LINKX_JWT_EXPIRATION}
      LINKX_JWT_REFRESH_EXPIRATION: ${LINKX_JWT_REFRESH_EXPIRATION}
      LINKX_UPLOAD_PATH: /data/linkx/uploads
      LINKX_UPLOAD_URL: ${LINKX_UPLOAD_URL}
      LINKX_SECURITY_ALLOWED_ORIGIN_PATTERNS: ${LINKX_SECURITY_ALLOWED_ORIGIN_PATTERNS}
      LINKX_SECURITY_AUTH_RATE_LIMIT_ENABLED: ${LINKX_SECURITY_AUTH_RATE_LIMIT_ENABLED}
      LINKX_SECURITY_AUTH_RATE_LIMIT_WINDOW_SECONDS: ${LINKX_SECURITY_AUTH_RATE_LIMIT_WINDOW_SECONDS}
      LINKX_SECURITY_AUTH_LOGIN_MAX_REQUESTS: ${LINKX_SECURITY_AUTH_LOGIN_MAX_REQUESTS}
      LINKX_SECURITY_AUTH_REGISTER_MAX_REQUESTS: ${LINKX_SECURITY_AUTH_REGISTER_MAX_REQUESTS}
      LINKX_SECURITY_AUTH_REFRESH_MAX_REQUESTS: ${LINKX_SECURITY_AUTH_REFRESH_MAX_REQUESTS}
      LINKX_SECURITY_AUTH_CAPTCHA_ISSUE_MAX_REQUESTS: ${LINKX_SECURITY_AUTH_CAPTCHA_ISSUE_MAX_REQUESTS}
      LINKX_SECURITY_CAPTCHA_ENABLED: ${LINKX_SECURITY_CAPTCHA_ENABLED}
      LINKX_SECURITY_TRUSTED_PROXY_ENABLED: ${LINKX_SECURITY_TRUSTED_PROXY_ENABLED}
      LINKX_SECURITY_ABUSE_PROTECTION_ENABLED: ${LINKX_SECURITY_ABUSE_PROTECTION_ENABLED}
      LINKX_SECURITY_USER_SEARCH_WINDOW_SECONDS: ${LINKX_SECURITY_USER_SEARCH_WINDOW_SECONDS}
      LINKX_SECURITY_USER_SEARCH_MAX_PER_USER: ${LINKX_SECURITY_USER_SEARCH_MAX_PER_USER}
      LINKX_SECURITY_USER_SEARCH_MAX_PER_IP: ${LINKX_SECURITY_USER_SEARCH_MAX_PER_IP}
      LINKX_SECURITY_FRIEND_REQUEST_MAX_PER_USER_DAY: ${LINKX_SECURITY_FRIEND_REQUEST_MAX_PER_USER_DAY}
      LINKX_SECURITY_FRIEND_REQUEST_MAX_PER_IP_DAY: ${LINKX_SECURITY_FRIEND_REQUEST_MAX_PER_IP_DAY}
    ports:
      - "${LINKX_SERVER_PORT}:8080"
    volumes:
      - server-uploads:/data/linkx/uploads

volumes:
  mysql-data:
  redis-data:
  server-uploads:
